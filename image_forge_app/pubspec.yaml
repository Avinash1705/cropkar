name: image_forge
description: A professional image editing app - crop, resize, compress, enhance and more.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  image_picker: ^1.0.7
  image: ^4.1.3
  image_cropper: ^7.0.0
  flutter_image_compress: ^2.1.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  share_plus: ^9.0.0
  google_fonts: ^6.2.1
  gap: ^3.0.1
  dotted_border: ^2.1.0
  saver_gallery: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
